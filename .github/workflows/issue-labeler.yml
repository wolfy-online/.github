name: Issue Labeler

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
    - name: Apply Labels
      uses: redhat-plumbers-in-action/advanced-issue-labeler@v2
      with:
        issue-form: false
        custom-rules: |
          bug:
            - '\[BUG\]'
            - 'bug'
            - 'error'
            - 'crash'

          enhancement:
            - '\[FEATURE\]'
            - 'feature'
            - 'enhancement'

          documentation:
            - '\[DOCS\]'
            - 'documentation'
            - 'readme'

          security:
            - '\[SECURITY\]'
            - 'security'
            - 'vulnerability'
            - 'cve'

          performance:
            - 'performance'
            - 'optimization'
            - 'latency'

          infrastructure:
            - 'devops'
            - 'infrastructure'
            - 'workflow'
            - 'ci'
            - 'cd'
