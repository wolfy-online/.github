name: Welcome Contributors

on:
  issues:
    types:
      - opened
  pull_request_target:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
    - name: Welcome New Contributors
      uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

        issue-message: |
          ### Welcome to Wolfy Open Source

          Thank you for opening your first issue.
          We appreciate your interest in contributing to Wolfy.

          A maintainer will review your issue soon.

        pr-message: |
          ### Welcome to Wolfy Open Source

          Thank you for your first contribution.
          We appreciate your effort in helping improve Wolfy.

          A maintainer will review your pull request soon.
