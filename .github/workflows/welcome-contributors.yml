name: Welcome Contributors

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Welcome First-Time Contributors
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const username = context.payload.sender.login;

              // Ignore bots
              if (context.payload.sender.type === "Bot") {
                console.log("Bot detected. Skipping.");
                return;
              }

              // Get all contributions (issues + PRs are both issues in GitHub)
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                creator: username,
                state: "all",
              });

              const isFirstTime = issues.length === 0;

              if (!isFirstTime) {
                console.log("Existing contributor. Skipping welcome message.");
                return;
              }

              const issueNumber =
                context.payload.issue?.number ||
                context.payload.pull_request?.number;

              if (!issueNumber) {
                console.log("No issue/PR number found.");
                return;
              }

              const body = `
### Welcome to Wolfy Open Source

Thank you for your contribution.

We appreciate your effort in contributing to a structured, scalable, and production-grade engineering ecosystem.

A maintainer will review your contribution soon.
`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });

              console.log("Welcome message sent.");

            } catch (error) {
              console.log("Workflow error:", error.message);
            }
